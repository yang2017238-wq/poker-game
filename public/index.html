<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>多人德州扑克</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: radial-gradient(circle at center, #1e7a45 0%, #145a32 45%, #0b3d22 100%);
      color: #fff;
      min-height: 100vh;
    }
    .page { max-width: 1400px; margin: 0 auto; padding: 20px; }
    .top-bar {
      display: flex; flex-wrap: wrap; gap: 12px; align-items: center; justify-content: center;
      background: rgba(0, 0, 0, 0.28); border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 18px; padding: 16px; margin-bottom: 18px; backdrop-filter: blur(6px);
    }
    .top-bar input {
      width: 150px; padding: 10px 12px; border-radius: 10px; border: none; outline: none; font-size: 15px;
    }
    .top-bar button, .action-buttons button {
      border: none; border-radius: 12px; padding: 10px 16px; font-size: 15px; font-weight: 600;
      cursor: pointer; transition: transform 0.15s ease, opacity 0.15s ease;
    }
    .top-bar button:hover, .action-buttons button:hover { transform: translateY(-1px); opacity: 0.92; }
    .btn-create { background: #2d8cff; color: white; }
    .btn-join { background: #5b6bff; color: white; }
    .btn-start { background: #ffb020; color: #222; }

    .layout { display: grid; grid-template-columns: 280px 1fr 280px; gap: 18px; }
    .panel {
      background: rgba(0, 0, 0, 0.28); border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 18px; padding: 16px; backdrop-filter: blur(6px);
    }
    .panel h3 { margin-top: 0; margin-bottom: 12px; font-size: 18px; }
    .info-line { margin: 8px 0; font-size: 15px; line-height: 1.5; }
    .status-list, .players-list { list-style: none; padding: 0; margin: 0; }
    .status-list li, .players-list li {
      padding: 10px 12px; margin-bottom: 10px; background: rgba(255, 255, 255, 0.08);
      border-radius: 12px; font-size: 14px; line-height: 1.5;
    }

    .table-wrap { position: relative; min-height: 760px; display: flex; align-items: center; justify-content: center; }
    .poker-table {
      position: relative; width: 100%; max-width: 760px; aspect-ratio: 1.45 / 1;
      background: radial-gradient(circle at center, #20864c 0%, #17673a 60%, #10482a 100%);
      border: 14px solid #5d3a1a; border-radius: 999px;
      box-shadow: inset 0 0 0 4px rgba(255,255,255,0.08), 0 16px 40px rgba(0,0,0,0.35);
    }
    .table-center {
      position: absolute; inset: 50% auto auto 50%; transform: translate(-50%, -50%);
      width: 70%; text-align: center;
    }
    .pot-box {
      display: inline-block; background: rgba(0, 0, 0, 0.28); padding: 10px 18px; border-radius: 999px;
      font-weight: 700; margin-bottom: 16px; border: 1px solid rgba(255,255,255,0.12);
    }
    .stage-box, .turn-box, .result-box {
      margin-top: 10px; padding: 10px 14px; border-radius: 14px;
      background: rgba(0, 0, 0, 0.22); border: 1px solid rgba(255,255,255,0.08); font-size: 14px;
    }

    .community-cards, .hand-cards {
      display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; min-height: 90px;
    }

    .player-seat {
      position: absolute; width: 180px; min-height: 102px; padding: 10px 12px;
      background: rgba(0, 0, 0, 0.35); border: 2px solid transparent;
      border-radius: 16px; text-align: center; transition: 0.2s ease;
    }
    .player-seat.active { border-color: #ffd54f; box-shadow: 0 0 18px rgba(255, 213, 79, 0.45); }
    .player-seat.folded { opacity: 0.55; }
    .player-seat .name { font-weight: 700; margin-bottom: 6px; }
    .player-seat .meta { font-size: 13px; line-height: 1.5; }

    .role-tags {
      display: flex; gap: 6px; justify-content: center; flex-wrap: wrap; margin-bottom: 6px; min-height: 22px;
    }
    .role-tag {
      font-size: 11px; padding: 2px 6px; border-radius: 999px; font-weight: 700; color: #111; background: #fff;
    }
    .role-d { background: #ffd54f; }
    .role-sb { background: #81d4fa; }
    .role-bb { background: #ef9a9a; }

    .seat-top { top: 18px; left: 50%; transform: translateX(-50%); }
    .seat-bottom { bottom: 18px; left: 50%; transform: translateX(-50%); }
    .seat-left { left: 24px; top: 50%; transform: translateY(-50%); }
    .seat-right { right: 24px; top: 50%; transform: translateY(-50%); }

    .card {
      width: 58px; height: 82px; background: #fff; color: #111; border-radius: 10px;
      display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: 700;
      box-shadow: 0 6px 14px rgba(0, 0, 0, 0.25); user-select: none;
    }
    .card.red { color: #d62828; }

    .my-hand-panel { margin-top: 18px; }
    .raise-input { margin-top: 14px; }
    .raise-input input {
      width: 100%; padding: 10px 12px; border-radius: 10px; border: none; outline: none; font-size: 15px;
    }

    .action-buttons {
      display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 14px;
    }
    .btn-check { background: #ecf0f1; color: #222; }
    .btn-call { background: #4caf50; color: white; }
    .btn-raise { background: #ff9800; color: white; }
    .btn-fold { background: #e53935; color: white; }

    .log-box { max-height: 280px; overflow-y: auto; padding-right: 4px; }
    .log-item {
      background: rgba(255,255,255,0.08); border-radius: 10px; padding: 10px 12px;
      margin-bottom: 8px; font-size: 14px; line-height: 1.5;
    }
    .muted { opacity: 0.78; font-size: 13px; }

    @media (max-width: 1180px) {
      .layout { grid-template-columns: 1fr; }
      .table-wrap { min-height: auto; }
      .poker-table { min-height: 680px; aspect-ratio: auto; border-radius: 40px; }
      .player-seat { width: 160px; }
    }

    @media (max-width: 760px) {
      .top-bar { justify-content: stretch; }
      .top-bar input, .top-bar button { width: 100%; }
      .poker-table { min-height: 760px; }
      .seat-left { left: 10px; }
      .seat-right { right: 10px; }
      .player-seat { width: 145px; padding: 8px; }
      .card { width: 48px; height: 70px; font-size: 20px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="top-bar">
      <input id="name" placeholder="你的名字">
      <input id="room" placeholder="房间号">
      <button class="btn-create" onclick="createRoom()">创建房间</button>
      <button class="btn-join" onclick="joinRoom()">加入房间</button>
      <button class="btn-start" onclick="startGame()">开始游戏</button>
    </div>

    <div class="layout">
      <div class="panel">
        <h3>房间信息</h3>
        <div class="info-line">当前阶段：<strong id="stage">waiting</strong></div>
        <div class="info-line">当前轮到：<strong id="turn">（未开始）</strong></div>
        <div class="info-line">底池：<strong id="pot">0</strong></div>
        <div class="info-line">当前最高下注：<strong id="currentBet">0</strong></div>

        <h3 style="margin-top:20px;">玩家列表</h3>
        <ul class="players-list" id="players"></ul>

        <div class="my-hand-panel">
          <h3>你的手牌</h3>
          <div class="hand-cards" id="handCards"></div>
        </div>

        <div class="raise-input">
          <input id="raiseAmount" type="number" min="1" value="50" placeholder="输入加注金额">
        </div>

        <div class="action-buttons">
          <button class="btn-check" onclick="playerAction('check')">Check</button>
          <button class="btn-call" onclick="playerAction('call')">Call</button>
          <button class="btn-raise" onclick="playerAction('raise')">Raise</button>
          <button class="btn-fold" onclick="playerAction('fold')">Fold</button>
        </div>
      </div>

      <div class="table-wrap">
        <div class="poker-table">
          <div class="player-seat seat-top" id="seat-top">
            <div class="role-tags"></div>
            <div class="name">等待玩家</div>
            <div class="meta">筹码: -<br>下注: -</div>
          </div>

          <div class="player-seat seat-left" id="seat-left">
            <div class="role-tags"></div>
            <div class="name">等待玩家</div>
            <div class="meta">筹码: -<br>下注: -</div>
          </div>

          <div class="player-seat seat-right" id="seat-right">
            <div class="role-tags"></div>
            <div class="name">等待玩家</div>
            <div class="meta">筹码: -<br>下注: -</div>
          </div>

          <div class="player-seat seat-bottom" id="seat-bottom">
            <div class="role-tags"></div>
            <div class="name">你</div>
            <div class="meta">筹码: -<br>下注: -</div>
          </div>

          <div class="table-center">
            <div class="pot-box">底池：<span id="potCenter">0</span></div>
            <div class="community-cards" id="communityCards"></div>
            <div class="stage-box">阶段：<span id="stageCenter">waiting</span></div>
            <div class="turn-box">当前行动：<span id="turnCenter">（未开始）</span></div>
            <div class="result-box">结果：<span id="result">（暂无）</span></div>
          </div>
        </div>
      </div>

      <div class="panel">
        <h3>玩家状态</h3>
        <ul class="status-list" id="status"></ul>

        <h3 style="margin-top:20px;">系统消息</h3>
        <div class="log-box" id="logBox"></div>
        <div class="muted" style="margin-top:8px;">黄色高亮表示当前轮到该玩家操作。D=庄家，SB=小盲，BB=大盲。</div>
      </div>
    </div>
  </div>

  <script>
    const wsProtocol = location.protocol === "https:" ? "wss:" : "ws:";
    const ws = new WebSocket(`${wsProtocol}//${location.host}`);

    let myName = "";
    let currentTurn = "（未开始）";
    let playersList = [];
    let statusList = [];
    let roles = {
      dealer: "",
      smallBlind: "",
      bigBlind: ""
    };

    function addLog(text) {
      const box = document.getElementById("logBox");
      const item = document.createElement("div");
      item.className = "log-item";
      item.textContent = text;
      box.prepend(item);
    }

    function cardClass(cardText) {
      if (!cardText) return "card";
      const isRed = cardText.includes("♥") || cardText.includes("♦");
      return isRed ? "card red" : "card";
    }

    function renderCards(containerId, cards) {
      const container = document.getElementById(containerId);
      container.innerHTML = "";
      if (!cards || cards.length === 0) return;

      cards.forEach((card) => {
        const div = document.createElement("div");
        div.className = cardClass(card);
        div.textContent = card;
        container.appendChild(div);
      });
    }

    function getPlayerStatusByName(name) {
      return statusList.find((player) => player.name === name);
    }

    function renderPlayersList() {
      const ul = document.getElementById("players");
      ul.innerHTML = "";

      playersList.forEach((name) => {
        const li = document.createElement("li");
        li.textContent = name === myName ? `${name}（你）` : name;
        ul.appendChild(li);
      });
    }

    function renderStatusList() {
      const ul = document.getElementById("status");
      ul.innerHTML = "";

      statusList.forEach((player) => {
        const li = document.createElement("li");
        const state = player.folded ? "已弃牌" : "游戏中";
        const self = player.name === myName ? "（你）" : "";
        li.textContent = `${player.name}${self}｜${state}｜筹码: ${player.chips}｜下注: ${player.bet}`;
        ul.appendChild(li);
      });
    }

    function buildRoleTags(playerName) {
      const tags = [];
      if (playerName === roles.dealer) tags.push('<span class="role-tag role-d">D</span>');
      if (playerName === roles.smallBlind) tags.push('<span class="role-tag role-sb">SB</span>');
      if (playerName === roles.bigBlind) tags.push('<span class="role-tag role-bb">BB</span>');
      return tags.join("");
    }

    function setSeatContent(seatId, playerName) {
      const seat = document.getElementById(seatId);
      const roleBox = seat.querySelector(".role-tags");
      const nameEl = seat.querySelector(".name");
      const metaEl = seat.querySelector(".meta");

      if (!playerName) {
        roleBox.innerHTML = "";
        nameEl.textContent = "等待玩家";
        metaEl.innerHTML = "筹码: -<br>下注: -";
        seat.classList.remove("active", "folded");
        return;
      }

      const info = getPlayerStatusByName(playerName);
      const displayName = playerName === myName ? `${playerName}（你）` : playerName;
      const chips = info ? info.chips : "-";
      const bet = info ? info.bet : "-";
      const folded = info ? info.folded : false;

      roleBox.innerHTML = buildRoleTags(playerName);
      nameEl.textContent = displayName;
      metaEl.innerHTML = `筹码: ${chips}<br>下注: ${bet}`;

      seat.classList.toggle("active", playerName === currentTurn);
      seat.classList.toggle("folded", folded);
    }

    function renderSeats() {
      const others = playersList.filter((name) => name !== myName);

      setSeatContent("seat-bottom", myName || null);
      setSeatContent("seat-top", others[0] || null);
      setSeatContent("seat-left", others[1] || null);
      setSeatContent("seat-right", others[2] || null);
    }

    ws.onmessage = (event) => {
      const data = JSON.parse(event.data);

      if (data.type === "players") {
        playersList = data.players;
        renderPlayersList();
        renderSeats();
      }

      if (data.type === "status") {
        statusList = data.players;
        renderStatusList();
        renderSeats();
      }

      if (data.type === "turn") {
        currentTurn = data.currentPlayer;
        document.getElementById("turn").innerText = data.currentPlayer;
        document.getElementById("turnCenter").innerText = data.currentPlayer;
        renderSeats();
      }

      if (data.type === "pot") {
        document.getElementById("pot").innerText = data.pot;
        document.getElementById("currentBet").innerText = data.currentBet;
        document.getElementById("potCenter").innerText = data.pot;
      }

      if (data.type === "community") {
        document.getElementById("stage").innerText = data.stage;
        document.getElementById("stageCenter").innerText = data.stage;
        renderCards("communityCards", data.cards);
      }

      if (data.type === "roles") {
        roles = {
          dealer: data.dealer || "",
          smallBlind: data.smallBlind || "",
          bigBlind: data.bigBlind || ""
        };
        renderSeats();
      }

      if (data.type === "hand") {
        renderCards("handCards", data.cards);
        document.getElementById("result").innerText = "（本局进行中）";
      }

      if (data.type === "result") {
        document.getElementById("result").innerText = data.text;
        addLog(data.text);
      }

      if (data.type === "system") {
        addLog(data.msg);
      }
    };

    ws.onopen = () => {
      addLog("已连接服务器");
    };

    ws.onclose = () => {
      addLog("与服务器断开连接");
    };

    function createRoom() {
      myName = document.getElementById("name").value.trim();
      ws.send(JSON.stringify({
        type: "create",
        roomId: document.getElementById("room").value.trim(),
        name: myName
      }));
      renderSeats();
    }

    function joinRoom() {
      myName = document.getElementById("name").value.trim();
      ws.send(JSON.stringify({
        type: "join",
        roomId: document.getElementById("room").value.trim(),
        name: myName
      }));
      renderSeats();
    }

    function startGame() {
      document.getElementById("result").innerText = "（本局进行中）";
      ws.send(JSON.stringify({
        type: "start",
        roomId: document.getElementById("room").value.trim()
      }));
    }

    function playerAction(action) {
      const payload = {
        type: "action",
        action,
        roomId: document.getElementById("room").value.trim()
      };

      if (action === "raise") {
        payload.amount = document.getElementById("raiseAmount").value;
      }

      ws.send(JSON.stringify(payload));
    }

    renderSeats();
  </script>
</body>
</html>
