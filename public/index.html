<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>德州扑克多人联机版</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>德州扑克多人联机版</h1>

    <div class="panel">
      <h2>进入游戏</h2>
      <input id="playerName" type="text" placeholder="输入你的名字" maxlength="12" />
      <button id="createRoomBtn">创建房间</button>

      <div class="join-box">
        <input id="roomIdInput" type="text" placeholder="输入房间号" />
        <button id="joinRoomBtn">加入房间</button>
      </div>

      <div id="status" class="status"></div>
      <div id="errorBox" class="error"></div>
    </div>

    <div class="panel">
      <h2>房间信息</h2>
      <div id="roomInfo"></div>
      <div id="pot"></div>
      <div id="currentBet"></div>
      <div id="winner" class="winner"></div>
    </div>

    <div class="panel">
      <h2>玩家列表</h2>
      <div id="players" class="players"></div>
    </div>

    <div class="panel">
      <h2>公共牌</h2>
      <div id="communityCards" class="cards-row"></div>
    </div>

    <div class="panel">
      <h2>我的手牌</h2>
      <div id="myHand" class="cards-row"></div>
    </div>

    <div class="panel">
      <h2>操作区</h2>
      <div class="actions">
        <button id="startGameBtn">开始游戏</button>
        <button id="restartGameBtn">下一局</button>
        <button id="checkBtn">过牌</button>
        <button id="callBtn">跟注</button>
        <input id="raiseAmount" type="number" placeholder="加注额" />
        <button id="raiseBtn">加注</button>
        <button id="foldBtn">弃牌</button>
      </div>
    </div>

    <div class="panel">
      <h2>操作记录</h2>
      <ul id="log"></ul>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="client.js"></script>
</body>
</html>
