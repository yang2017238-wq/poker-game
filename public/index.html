<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0f5b45" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>公网德州扑克牌桌</title>
  <link rel="stylesheet" href="style.css?v=20260323-4" />
</head>
<body>
  <div id="appShell" class="app-shell">
    <section id="lobbyScreen" class="lobby-screen">
      <div class="lobby-shell">
        <div class="lobby-copy">
          <p class="eyebrow">Public Texas Hold'em Table</p>
          <h1>先进入房间，再上牌桌</h1>
          <p class="hero-copy">大厅只负责创建和加入房间。进入后会切换到横屏牌桌界面，避免桌面被表单挤占。</p>
        </div>

        <div class="lobby-card">
          <p class="section-kicker">房间大厅</p>
          <h2>创建或加入房间</h2>
          <div class="field-grid">
            <label class="field">
              <span>昵称</span>
              <input id="playerName" type="text" maxlength="12" placeholder="例如：Zhuanz" />
            </label>
            <label class="field">
              <span>房间号</span>
              <input id="roomIdInput" type="text" maxlength="6" placeholder="输入 6 位房间号" />
            </label>
          </div>
          <div class="button-row">
            <button id="createRoomBtn" class="btn btn-primary">创建房间</button>
            <button id="joinRoomBtn" class="btn btn-secondary">加入房间</button>
          </div>
          <p id="shareLink" class="share-link">创建房间后，这里会显示邀请链接</p>
        </div>
      </div>
    </section>

    <section id="tableScreen" class="table-screen">
      <header class="hero table-hero">
        <div class="hero-status">
          <div class="status-card">
            <span class="status-label">房间号</span>
            <strong id="roomCode">未加入</strong>
          </div>
          <div class="status-card">
            <span class="status-label">阶段</span>
            <strong id="stageText">等待开局</strong>
          </div>
          <div class="status-card">
            <span class="status-label">底池</span>
            <strong id="potText">0</strong>
          </div>
        </div>
      </header>

      <div id="turnBanner" class="turn-banner"></div>

      <div id="rotateOverlay" class="rotate-overlay">
        <div class="rotate-card">
          <p class="section-kicker">横屏专用</p>
          <h2>请横过手机进入牌桌</h2>
          <p>这个牌桌界面已经按横屏手游布局设计。请切换到横屏后继续操作。</p>
        </div>
      </div>

      <div id="settlementModal" class="settlement-modal">
        <div class="settlement-card">
          <div class="settlement-head">
            <div>
              <p class="section-kicker">牌局结算</p>
              <h2 id="settlementTitle">本局结果</h2>
            </div>
            <button id="closeSettlementBtn" class="settlement-close" type="button">关闭</button>
          </div>
          <p id="settlementSummary" class="settlement-summary"></p>
          <div id="settlementList" class="settlement-list"></div>
        </div>
      </div>

      <main class="layout">
        <section class="table-panel">
          <div class="table-stage">
            <div class="table-tools">
              <button id="backToLobbyBtn" class="tool-btn" type="button">大厅</button>
              <button id="copyLinkBtn" class="tool-btn" type="button">邀请</button>
              <button id="startGameBtn" class="tool-btn tool-btn-gold" type="button">开始</button>
            </div>

            <div class="poker-table">
              <div class="table-hud">
                <div class="hud-chip"><span>房间</span><strong id="hudRoomCode">未加入</strong></div>
                <div class="hud-chip"><span>阶段</span><strong id="hudStageText">等待开局</strong></div>
                <div class="hud-chip"><span>盲注</span><strong id="hudBlindsText">10 / 20</strong></div>
                <div class="hud-chip"><span>手数</span><strong id="hudHandText">第 0 局</strong></div>
              </div>

              <div class="table-center">
                <div class="pot-pill">底池 <strong id="tablePot">0</strong></div>
                <div id="communityCards" class="cards-row community-row"></div>
                <div id="winnerBanner" class="winner-banner"></div>
              </div>

              <div id="players" class="seats"></div>
            </div>
          </div>

          <div class="my-hand-panel">
            <div class="my-hand-header">
              <h3>我的手牌</h3>
              <span id="turnHint">等待加入房间</span>
            </div>
            <div id="myHand" class="cards-row hand-row"></div>
          </div>

          <section class="panel reveal-panel">
            <div class="reveal-head">
              <div>
                <p class="section-kicker">摊牌结果</p>
                <h2>本局底牌公开</h2>
              </div>
              <span id="revealHint">牌局结束后显示</span>
            </div>
            <div id="revealedHands" class="revealed-grid"></div>
          </section>
        </section>
      </main>

      <div class="mobile-action-dock">
        <div class="dock-top">
          <div id="dockStage" class="dock-chip">等待开局</div>
          <div id="dockCall" class="dock-chip">跟注 0</div>
          <div id="dockRaise" class="dock-chip">下注到 20</div>
        </div>
        <div id="actionSummary" class="summary-box dock-summary">等待房主开始。</div>
        <div class="dock-betbar">
          <label class="dock-betfield">
            <span>下注总额</span>
            <input id="betAmountInput" type="number" min="20" step="10" value="20" />
          </label>
        </div>
        <div class="dock-actions">
          <button id="dockFoldBtn" class="btn btn-danger">弃牌</button>
          <button id="dockCheckBtn" class="btn btn-secondary">过牌</button>
          <button id="dockCallBtn" class="btn btn-secondary">跟注</button>
          <button id="dockRaiseBtn" class="btn btn-primary">下注 / 加注</button>
          <button id="dockAllInBtn" class="btn btn-warning">全下</button>
        </div>
      </div>
    </section>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="client.js?v=20260323-4"></script>
</body>
</html>
