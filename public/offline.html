<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>暂时离线</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(180deg, #081218, #10242d);
      color: #f8f4e7;
      font-family: "Trebuchet MS", "PingFang SC", sans-serif;
    }
    .card {
      max-width: 360px;
      padding: 24px;
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.1);
      text-align: center;
    }
    h1 {
      margin: 0 0 12px;
    }
    p {
      margin: 0;
      color: #b9c8c3;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>当前离线</h1>
    <p>网络恢复后重新打开牌桌，就可以继续和朋友联机。</p>
  </div>
</body>
</html>
